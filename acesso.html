<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <title>Acesso Privado | Adeilda Variações</title>
  <style>
    :root{
      --dark:#1f1828;
      --gold:#8a5a17;
      --danger:#a8241b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:Arial,Helvetica,sans-serif;
      background:radial-gradient(circle at 20% 0%, rgba(232,202,194,.95), transparent 35%),linear-gradient(135deg,#f7e6e1,#f7f1e8 52%,#efe1d3);
      color:var(--dark);
    }
    .card{
      width:min(100%,430px);
      background:rgba(255,255,255,.94);
      border:1px solid rgba(255,255,255,.8);
      border-radius:32px;
      box-shadow:0 24px 70px rgba(31,24,40,.16);
      padding:34px 26px 26px;
      text-align:center;
    }
    .logo{
      width:76px;
      height:76px;
      border-radius:28px;
      margin:0 auto 16px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,#2b2034,#5a3821);
      color:#fff;
      font-family:Georgia,'Times New Roman',serif;
      font-size:32px;
      letter-spacing:-3px;
      box-shadow:0 16px 32px rgba(31,24,40,.22);
    }
    h1{margin:0;font-family:Georgia,'Times New Roman',serif;font-size:42px;line-height:1;color:#3d2414;font-weight:500}
    .sub{margin:8px 0 24px;letter-spacing:.32em;text-transform:uppercase;font-size:12px;font-weight:700;color:var(--gold)}
    p{margin:0 0 22px;color:#62544c;line-height:1.55;font-size:15px}
    label{display:block;text-align:left;font-size:13px;font-weight:800;margin:0 0 8px 4px;color:#2b2530}
    input{width:100%;border:1px solid #eadfd7;background:#fff;color:#211b24;border-radius:18px;padding:17px 16px;font-size:18px;outline:none;text-align:center;box-shadow:inset 0 1px 0 rgba(0,0,0,.02)}
    input:focus{border-color:#b88d4a;box-shadow:0 0 0 4px rgba(184,141,74,.14)}
    button{width:100%;border:0;margin-top:14px;border-radius:18px;padding:17px 16px;cursor:pointer;color:#fff;font-weight:900;font-size:17px;background:linear-gradient(135deg,#251c2e,#4a301f);box-shadow:0 14px 26px rgba(31,24,40,.20)}
    .erro{display:none;margin-top:14px;padding:12px;border-radius:15px;color:#fff;background:var(--danger);font-weight:800;font-size:14px}
    .hint{margin-top:18px;font-size:12px;color:#88786f}
  </style>
</head>
<body>
  <main class="card" aria-label="Acesso privado">
    <div class="logo">AV</div>
    <h1>Adeilda</h1>
    <div class="sub">Variações</div>
    <p>Essa vitrine é exclusiva para clientes. Digite o código de acesso para entrar.</p>
    <label for="codigo">Código de acesso</label>
    <input id="codigo" type="password" autocomplete="off" placeholder="Digite o código">
    <button id="entrarBtn" type="button">Entrar</button>
    <div id="erro" class="erro">Código incorreto.</div>
    <div class="hint">Solicite o código diretamente pelo atendimento da loja.</div>
  </main>

  <script>
    const CODIGO_CORRETO = "ADEILDA2026";
    function entrar() {
      const campo = document.getElementById("codigo");
      const erro = document.getElementById("erro");
      const codigo = (campo.value || "").trim();
      if (codigo === CODIGO_CORRETO) {
        sessionStorage.setItem("adeilda_cliente_ok", "sim");
        const params = new URLSearchParams(window.location.search);
        const next = params.get("next") || "/index.html";
        window.location.href = next;
        return;
      }
      erro.style.display = "block";
      campo.focus();
      campo.select();
    }
    document.getElementById("entrarBtn").addEventListener("click", entrar);
    document.getElementById("codigo").addEventListener("keydown", function (event) {
      if (event.key === "Enter") entrar();
    });
  </script>
</body>
</html>
