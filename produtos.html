<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <script src="privado.js"></script>
  <title>Produtos | Adeilda Variações</title>
  <meta name="description" content="Todos os produtos da Adeilda Variações.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="produtos">
  <div class="site-shell">
    <header class="topbar">
      <div class="container nav">
        <a href="index.html" class="brand"><div class="logo-mark">AV</div><div class="logo-text"><strong>Adeilda</strong><span>Variações</span></div></a>
        <nav class="desktop-links"><a data-nav="home" href="index.html">Início</a><a data-nav="produtos" href="produtos.html">Produtos</a><a data-nav="perfil" href="perfil.html">Perfil</a><a data-nav="adm" href="adm.html">ADM</a></nav>
        <div class="search-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg><input id="searchInput" type="search" placeholder="Pesquisar produtos..."></div>
        <div class="icon-row"><a class="icon-btn" href="perfil.html"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="7" r="4"></circle></svg></a><a class="icon-btn" href="carrinho.html"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12z"></path><path d="M6 6 5 2H2"></path><circle cx="9" cy="20" r="1"></circle><circle cx="18" cy="20" r="1"></circle></svg><span class="cart-count">0</span></a></div>
      </div>
      <div class="container mobile-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg><input id="mobileSearchInput" type="search" placeholder="Pesquisar produtos..."></div>
    </header>

    <main class="container section">
      <div class="breadcrumb"><a href="index.html">Início</a> / Produtos</div>
      <div class="section-head">
        <div>
          <div class="section-kicker">Loja</div>
          <h1 class="section-title">Todos os Produtos</h1>
          <p class="section-subtitle">Filtre por categoria, tipo, pronta entrega e encomenda.</p>
        </div>
      </div>
      <div id="productsNotice"></div>
      <div class="chips">
        <button class="chip active" data-chip="" type="button">Todos</button>
        <button class="chip" data-chip="Calça" type="button">Calça</button>
        <button class="chip" data-chip="Camisa" type="button">Camisa</button>
        <button class="chip" data-chip="Short" type="button">Short</button>
        <button class="chip" data-chip="Sapato" type="button">Sapato</button>
        <button class="chip" data-chip="Sandália" type="button">Sandália</button>
        <button class="chip gold" data-chip="Pronta Entrega" type="button">Pronta Entrega</button>
        <button class="chip gold" data-chip="Encomenda" type="button">Encomenda</button>
      </div>

      <div class="layout">
        <aside class="filter-panel">
          <div class="filter-group">
            <h3>Categoria</h3>
            <div class="check-list">
              <label class="check-row"><input type="checkbox" data-filter-check value="Calça"> Calça</label>
              <label class="check-row"><input type="checkbox" data-filter-check value="Camisa"> Camisa</label>
              <label class="check-row"><input type="checkbox" data-filter-check value="Short"> Short</label>
              <label class="check-row"><input type="checkbox" data-filter-check value="Sapato"> Sapato</label>
              <label class="check-row"><input type="checkbox" data-filter-check value="Sandália"> Sandália</label>
            </div>
          </div>
          <div class="filter-group">
            <h3>Público</h3>
            <div class="check-list">
              <label class="check-row"><input type="checkbox" data-filter-check value="Masculino"> Masculino</label>
              <label class="check-row"><input type="checkbox" data-filter-check value="Feminino"> Feminino</label>
              <label class="check-row"><input type="checkbox" data-filter-check value="Infantil"> Infantil</label>
            </div>
          </div>
          <div class="filter-group">
            <h3>Entrega</h3>
            <div class="check-list">
              <label class="check-row"><input type="checkbox" data-filter-check value="Pronta Entrega"> Pronta Entrega</label>
              <label class="check-row"><input type="checkbox" data-filter-check value="Encomenda"> Encomenda</label>
            </div>
          </div>
          <button id="clearFilters" class="btn light full" type="button">Limpar filtros</button>
        </aside>

        <section>
          <div class="toolbar">
            <strong id="productsCount">0 produtos</strong>
            <select id="sortSelect" aria-label="Ordenar produtos">
              <option value="">Mais recentes</option>
              <option value="price-asc">Menor preço</option>
              <option value="price-desc">Maior preço</option>
              <option value="name">Nome A-Z</option>
            </select>
          </div>
          <div id="productsGrid" class="product-grid"><div class="loader"></div></div>
        </section>
      </div>
    </main>

    <footer class="footer"><div class="container footer-grid"><div class="brand"><div class="logo-mark">AV</div><div class="logo-text"><strong>Adeilda</strong><span>Variações</span></div></div><p>Escolha os produtos e finalize com Mercado Pago.</p><a class="btn gold js-whatsapp" href="#">WhatsApp</a></div></footer>
  </div>
  <a class="wa-float js-whatsapp" href="#">WhatsApp</a>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="assets/main.js"></script>
</body>
</html>
