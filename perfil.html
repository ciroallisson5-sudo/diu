<!doctype html>
<html lang="pt-BR">
<head>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Perfil e Login | Adeilda Variações</title>
  <meta name="description" content="Entrar ou criar conta na Adeilda Variações.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="privado.js"></script>
</head>
<body data-page="perfil">
  <div class="site-shell">
    <header class="topbar">
      <div class="container nav">
        <a href="index.html" class="brand"><div class="logo-mark">AV</div><div class="logo-text"><strong>Adeilda</strong><span>Variações</span></div></a>
        <nav class="desktop-links"><a data-nav="home" href="index.html">Início</a><a data-nav="produtos" href="produtos.html">Produtos</a><a data-nav="perfil" href="perfil.html">Perfil</a><a data-nav="adm" href="adm.html">ADM</a></nav>
        <div class="icon-row"><a class="icon-btn" href="carrinho.html"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12z"></path><path d="M6 6 5 2H2"></path><circle cx="9" cy="20" r="1"></circle><circle cx="18" cy="20" r="1"></circle></svg><span class="cart-count">0</span></a></div>
      </div>
    </header>

    <main class="container">
      <section class="profile-hero">
        <div class="profile-inner">
          <div class="avatar">A</div>
          <div class="profile-name"><h1>Adeilda</h1><p>Variações</p></div>
        </div>
      </section>
      <section class="profile-tiles">
        <a class="profile-tile" href="carrinho.html"><div class="tile-icon">🛍️</div>Meus Pedidos</a>
        <a class="profile-tile" href="produtos.html"><div class="tile-icon">♡</div>Favoritos</a>
        <a class="profile-tile js-whatsapp" href="#"><div class="tile-icon">📍</div>Endereços</a>
        <a class="profile-tile" href="adm.html"><div class="tile-icon">⚙️</div>ADM</a>
      </section>

      <section class="section">
        <div class="section-head">
          <div>
            <div class="section-kicker">Conta</div>
            <h1 class="section-title">Perfil/Login</h1>
            <p class="section-subtitle">Cadastro simples com nome, email, senha e celular usando Supabase Auth.</p>
          </div>
          <button id="logoutBtn" class="btn light hidden" type="button">Sair</button>
        </div>
        <div id="authStatus"></div>
        <div class="card">
          <div class="tabs">
            <button class="tab active" data-tab="loginPanel" type="button">Entrar</button>
            <button class="tab" data-tab="signupPanel" type="button">Cadastrar</button>
          </div>
          <div class="auth-panels">
            <div id="loginPanel" class="panel active">
              <form id="loginForm">
                <div class="field"><label>Email</label><input name="email" type="email" required placeholder="seuemail@exemplo.com"></div>
                <div class="field"><label>Senha</label><input name="senha" type="password" required minlength="6" placeholder="Sua senha"></div>
                <button class="btn gold full" type="submit">Entrar</button>
              </form>
            </div>
            <div id="signupPanel" class="panel">
              <form id="signupForm">
                <div class="two">
                  <div class="field"><label>Nome</label><input name="nome" required placeholder="Seu nome"></div>
                  <div class="field"><label>Celular</label><input name="celular" inputmode="tel" required placeholder="558799999999"></div>
                </div>
                <div class="field"><label>Email</label><input name="email" type="email" required placeholder="seuemail@exemplo.com"></div>
                <div class="field"><label>Senha</label><input name="senha" type="password" required minlength="6" placeholder="Mínimo 6 caracteres"></div>
                <button class="btn gold full" type="submit">Criar conta</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer"><div class="container footer-grid"><div class="brand"><div class="logo-mark">AV</div><div class="logo-text"><strong>Adeilda</strong><span>Variações</span></div></div><p>Seu perfil fica conectado ao Supabase Auth.</p><a class="btn gold js-whatsapp" href="#">WhatsApp</a></div></footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="assets/main.js"></script>
</body>
</html>
